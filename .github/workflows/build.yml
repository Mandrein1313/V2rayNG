name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: '14742923'
        packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'

    - name: Build libhevtun
      run: |
        # ค้นหาไฟล์สคริปต์ที่แท้จริง
        COMPILE_SCRIPT=$(find ${{ github.workspace }} -name "compile-hevtun.sh" | head -n 1)
        bash $COMPILE_SCRIPT
    
    - name: Copy libhevtun
      run: |
        # หาที่เก็บไฟล์ libs หลังคอมไพล์ และที่เก็บ app
        LIBS_DIR=$(find ${{ github.workspace }} -type d -name "libs" | grep -v "app/libs" | head -n 1)
        APP_DIR=$(find ${{ github.workspace }} -type d -name "app" | grep "V2rayNG/app" | head -n 1)
        mkdir -p $APP_DIR/libs
        cp -r $LIBS_DIR/* $APP_DIR/libs/

    - name: Build APK
      run: |
        # ค้นหาตำแหน่งโปรเจกต์ Android จริงๆ
        V2RAY_ROOT=$(find ${{ github.workspace }} -type d -name "V2rayNG" | head -n 1)
        cd $V2RAY_ROOT
        ./gradlew assembleRelease
